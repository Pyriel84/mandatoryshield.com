# ╔══════════════════════════════════════════════════════════════╗
# ║  Mandatory Shield — nginx.conf pour Scaleway Instance        ║
# ║  Déposer dans : /etc/nginx/sites-available/mandatoryshield   ║
# ╚══════════════════════════════════════════════════════════════╝

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mandatoryshield.com www.mandatoryshield.com;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mandatoryshield.com$request_uri;
    }
}

# Redirection www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mandatoryshield.com;

    ssl_certificate     /etc/letsencrypt/live/mandatoryshield.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mandatoryshield.com/privkey.pem;

    return 301 https://mandatoryshield.com$request_uri;
}

# Serveur principal HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mandatoryshield.com;

    root /var/www/mandatory-shield;
    index index.html;

    # ── TLS ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mandatoryshield.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mandatoryshield.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── En-têtes de sécurité ───────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy   "default-src 'none'; script-src 'self'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none'; upgrade-insecure-requests;" always;

    # Masquer la version nginx
    server_tokens off;
    more_clear_headers Server;

    # ── Cache des assets statiques ─────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Répéter les en-têtes de sécurité (nginx ne les hérite pas dans les blocs location)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                       always;
        add_header X-Frame-Options           "DENY"                                          always;
    }

    # ── HTML : jamais mis en cache ─────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma        "no-cache";
    }

    # ── Bloquer les fichiers sensibles ─────────────────────────
    location ~ /\.                        { deny all; return 404; }
    location = /nginx.conf                { deny all; return 404; }
    location = /architecture              { deny all; return 404; }
    location ~* \.(md|log|bak|sql|env)$  { deny all; return 404; }

    # ── Limiter les méthodes HTTP ──────────────────────────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Pas de directory listing ───────────────────────────────
    autoindex off;

    # ── Routing principal ──────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/mandatoryshield.access.log;
    error_log  /var/log/nginx/mandatoryshield.error.log warn;
}
