# ╔══════════════════════════════════════════════════════════════╗
# ║  Mandatory Shield — nginx.conf pour Scaleway Instance        ║
# ║  Déposer dans : /etc/nginx/sites-available/mandatoryshield   ║
# ╚══════════════════════════════════════════════════════════════╝

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mandatoryshield.com www.mandatoryshield.com;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mandatoryshield.com$request_uri;
    }
}

# Redirection www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mandatoryshield.com;

    ssl_certificate     /etc/letsencrypt/live/mandatoryshield.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mandatoryshield.com/privkey.pem;

    return 301 https://mandatoryshield.com$request_uri;
}

# Serveur principal HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mandatoryshield.com;

    root /var/www/mandatoryshield.com;
    index index.html;

    # ── TLS ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/mandatoryshield.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mandatoryshield.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── En-têtes de sécurité ───────────────────────────────────
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options       "nosniff"                                       always;
    add_header X-Frame-Options              "DENY"                                          always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                                   always;
    add_header Cross-Origin-Resource-Policy "same-origin"                                   always;
    add_header Content-Security-Policy      "default-src 'none'; script-src 'self'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self'; connect-src 'self' https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com; object-src 'none'; upgrade-insecure-requests;" always;

    # Compression GZIP
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Masquer la version nginx
    server_tokens off;
    #more_clear_headers Server;

    # ── Cache des assets statiques ─────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable"                                            always;
        access_log off;

        # Répéter les en-têtes de sécurité (pas hérités du bloc server)
        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload"  always;
        add_header X-Content-Type-Options       "nosniff"                                       always;
        add_header X-Frame-Options              "DENY"                                          always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin"                                   always;
        add_header Cross-Origin-Resource-Policy "same-origin"                                   always;
    }

    # ── HTML : jamais mis en cache + en-têtes de sécurité répétés ────────────
    # OBLIGATOIRE : un bloc location qui a ses propres add_header n'hérite plus
    # d'AUCUN add_header du bloc server parent (règle nginx). Sans répétition,
    # tous les en-têtes de sécurité sont absents sur les réponses HTML → note F.
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate"                          always;
        add_header Pragma        "no-cache"                                                     always;

        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload"  always;
        add_header X-Content-Type-Options       "nosniff"                                       always;
        add_header X-Frame-Options              "DENY"                                          always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy           "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy   "same-origin"                                   always;
        add_header Cross-Origin-Resource-Policy "same-origin"                                   always;
        add_header Content-Security-Policy      "default-src 'none'; script-src 'self'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self'; connect-src 'self' https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com; object-src 'none'; upgrade-insecure-requests;" always;
    }

    # ── Bloquer les fichiers sensibles ─────────────────────────
    location ~ /\.                        { deny all; return 404; }
    location = /nginx.conf                { deny all; return 404; }
    location = /architecture              { deny all; return 404; }
    location ~* \.(md|log|bak|sql|env)$  { deny all; return 404; }

    # ── Limiter les méthodes HTTP ──────────────────────────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Pas de directory listing ───────────────────────────────
    autoindex off;

    # ── Page 404 personnalisée ─────────────────────────────────
    error_page 404 /404.html;
    location = /404.html { internal; }

    # ── Rate limiting ──────────────────────────────────────────
    # Ajouter dans le bloc http {} de /etc/nginx/nginx.conf :
    #   limit_req_zone $binary_remote_addr zone=msc_limit:10m rate=20r/s;

    # ── Routing principal ──────────────────────────────────────
    location / {
        # limit_req zone=msc_limit burst=40 nodelay;
        try_files $uri $uri/ =404;
    }

    # ── Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/mandatoryshield.access.log;
    error_log  /var/log/nginx/mandatoryshield.error.log warn;
}
